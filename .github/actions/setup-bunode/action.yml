name: Setup Bunode for CI
description: Install the project's Bunode runtime for CI

runs:
  using: composite
  steps:
    - name: Resolve runtime versions
      id: runtime
      shell: bash
      run: |
        runtime_version=$(node -p "require('./package.json').devEngines.runtime.version")
        echo "node-version=${runtime_version%%+bun.*}" >> "$GITHUB_OUTPUT"
        echo "bun-version=${runtime_version#*+bun.}" >> "$GITHUB_OUTPUT"
        echo "runtime-version=${runtime_version}" >> "$GITHUB_OUTPUT"

    - name: Setup Vite+
      uses: voidzero-dev/setup-vp@v1
      with:
        cache: true
        node-version: ${{ steps.runtime.outputs.node-version }}
        run-install: false

    - name: Install Bunode runtime
      shell: bash
      working-directory: ${{ runner.temp }}
      run: >-
        vp env exec --node "${{ steps.runtime.outputs.node-version }}"
        vp dlx @bunode/cli patch "${{ steps.runtime.outputs.bun-version }}"
        --copy "${VP_HOME:-$HOME/.vite-plus}/js_runtime/node/${{ steps.runtime.outputs.runtime-version }}"
        --yes

    - name: Install dependencies with Bunode
      shell: bash
      run: vp env exec --node "${{ steps.runtime.outputs.runtime-version }}" vp install

    - name: Select Bunode runtime
      shell: bash
      run: vp env use "${{ steps.runtime.outputs.runtime-version }}"

    - name: Verify Bunode runtime
      shell: bash
      run: |
        node -e "if (process.version !== 'v${{ steps.runtime.outputs.node-version }}' || process.versions.bun !== '${{ steps.runtime.outputs.bun-version }}') process.exit(1)"
