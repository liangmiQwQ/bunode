name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release without a v prefix
        required: true
        type: string

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Release
    if: github.repository == 'liangmiQwQ/bunode'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.18.0

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-edit@0.13.11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump versions
        run: pnpm exec vp run prepare-release -- "${{ inputs.version }}"

      - name: Generate release log
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f "tag_name=v${VERSION}" \
            -f "target_commitish=${GITHUB_SHA}" \
            --jq .body > release-notes.md

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: 'chore(release): v${{ inputs.version }}'
          title: 'chore(release): v${{ inputs.version }}'
          branch: release/v${{ inputs.version }}
          base: main
          body-path: release-notes.md
          assignees: ${{ github.actor }}
          sign-commits: true
