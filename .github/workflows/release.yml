name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - packages/cli/package.json

permissions: {}

jobs:
  check:
    name: Check version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release: ${{ steps.version.outputs.release }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - id: version
        shell: bash
        run: |
          set -euo pipefail
          version=$(node -p "require('./packages/cli/package.json').version")
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          tag=latest
          if [[ "$version" == *-* ]]; then
            tag=${version#*-}
            tag=${tag%%.*}
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          if npm view "@bunode/cli@${version}" version >/dev/null 2>&1; then
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (${{ matrix.target }})
    needs: check
    if: needs.check.outputs.release == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            musl: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            musl: true
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.musl
        run: sudo apt-get update && sudo apt-get install --yes musl-tools

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: cargo build --release --target ${{ matrix.target }} --package bunode --bins

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: bunode-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bunode
            target/${{ matrix.target }}/release/bunode.exe
            target/${{ matrix.target }}/release/node
            target/${{ matrix.target }}/release/node.exe
          if-no-files-found: error

  publish:
    name: Publish
    needs:
      - check
      - build
    if: needs.check.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          node-version: 22.18.0
          run-install: true

      - name: Configure npm registry
        uses: actions/setup-node@v5
        with:
          node-version: 22.18.0
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: bunode-*

      - name: Build JavaScript wrapper
        run: vp pack
        working-directory: packages/cli

      - name: Prepare platform packages
        run: node packages/cli/scripts/prepare-release.ts release-artifacts

      - name: Update npm
        working-directory: ${{ runner.temp }}
        run: npm install --global npm@11.18.0

      - name: Publish platform packages
        shell: bash
        working-directory: packages/cli/npm
        env:
          NPM_TAG: ${{ needs.check.outputs.tag }}
        run: |
          set -euo pipefail
          for package in */; do
            name=$(node -p "require('./${package}package.json').name")
            version=$(node -p "require('./${package}package.json').version")
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "Skipping existing ${name}@${version}"
            else
              (cd "$package" && npm publish --tag "$NPM_TAG" --provenance --access public)
            fi
          done

      - name: Publish JavaScript wrapper
        working-directory: packages/cli
        env:
          NPM_TAG: ${{ needs.check.outputs.tag }}
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          if npm view "@bunode/cli@${VERSION}" version >/dev/null 2>&1; then
            echo "Skipping existing @bunode/cli@${VERSION}"
          else
            npm publish --tag "$NPM_TAG" --provenance --access public
          fi

  release:
    name: Create GitHub release
    needs:
      - check
      - publish
    if: >-
      always() &&
      needs.check.result == 'success' &&
      (needs.publish.result == 'success' || needs.publish.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Skipping existing GitHub release v${VERSION}"
          else
            gh release create "v${VERSION}" --generate-notes --target "${GITHUB_SHA}" --title "v${VERSION}"
          fi
